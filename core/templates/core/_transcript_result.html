{% load i18n %}
<div class="flex flex-col gap-3">
  <div class="flex items-center justify-between flex-wrap gap-2">
    <label class="text-sm font-bold text-slate-700 dark:text-slate-300">
      {% trans "Танылған мәтін:" %}
    </label>
    <div class="flex gap-2 flex-wrap">
      <button onclick="copyText('{{ textarea_id }}')"
        class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-primary/10 text-primary text-sm font-bold hover:bg-primary/20 transition-all">
        <span class="material-symbols-outlined text-sm">content_copy</span>
        {% trans "Көшіру" %}
      </button>
      <button onclick="clearText('{{ textarea_id }}', '{{ textarea_id|slice:':-4' }}CharCount', '{{ textarea_id|slice:':-4' }}WordCount')"
        class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-sm font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
        <span class="material-symbols-outlined text-sm">delete</span>
        {% trans "Тазалау" %}
      </button>
      <button onclick="downloadText('{{ textarea_id }}', 'transcript.txt')"
        class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-all">
        <span class="material-symbols-outlined text-sm">download</span>
        {% trans "TXT жүктеу" %}
      </button>
    </div>
  </div>
  <textarea id="{{ textarea_id }}" rows="8"
    class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 text-base leading-relaxed resize-none focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"
    placeholder="{% trans 'Мәтін осында шығады...' %}"></textarea>
  <div class="flex items-center justify-between text-xs text-slate-400">
    {% if textarea_id == "resultText" %}
    <span id="micCharCount">0 {% trans "символ" %}</span>
    <span id="micWordCount">0 {% trans "сөз" %}</span>
    {% else %}
    <span id="fileCharCount">0 {% trans "символ" %}</span>
    <span id="fileWordCount">0 {% trans "сөз" %}</span>
    {% endif %}
  </div>
</div>
