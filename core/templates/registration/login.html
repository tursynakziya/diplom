{% extends 'base.html' %}
{% block title %}Кіру{% endblock %}

{% block content %}
<section class="flex items-center justify-center px-6 py-20">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-lg border border-primary/10 p-8">
      <div class="flex flex-col items-center gap-3 mb-8">
        <div class="size-14 flex items-center justify-center bg-primary text-white rounded-2xl">
          <span class="material-symbols-outlined text-3xl">auto_stories</span>
        </div>
        <h1 class="text-2xl font-black text-slate-900 dark:text-slate-100">Жүйеге кіру</h1>
        <p class="text-slate-500 text-sm text-center">Платформаны пайдалану үшін кіріңіз</p>
      </div>

      <form method="post" class="flex flex-col gap-5">
        {% csrf_token %}
        {% for field in form %}
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">{{ field.label }}</label>
          <input
            type="{{ field.field.widget.input_type }}"
            name="{{ field.html_name }}"
            {% if field.value %}value="{{ field.value }}"{% endif %}
            class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none"
            placeholder="{{ field.label }}"
          />
          {% if field.errors %}
            <p class="text-red-500 text-xs">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full rounded-xl h-12 bg-primary text-white font-bold text-base shadow-lg shadow-primary/30 hover:bg-primary/90 transition-all mt-2">
          Кіру
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-slate-500 text-sm">
          Тіркелмеген бе?
          <a href="{% url 'signup' %}" class="text-primary font-semibold hover:underline">Тіркелу</a>
        </p>
      </div>
    </div>
  </div>
</section>
{% endblock %}
